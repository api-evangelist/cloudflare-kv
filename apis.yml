apis:
  - aid: cloudflare-kv:cloudflare-kv-rest-api
    name: Cloudflare KV REST API
    description: >
      The Cloudflare KV REST API provides external application access to
      Workers KV namespaces and key-value pairs. Endpoints cover namespace
      management (create, list, rename, delete), key enumeration, individual
      value reads and writes, bulk operations (up to 10,000 pairs), bulk
      deletes, and key metadata retrieval. All requests are authenticated with
      a Bearer API token scoped to the target account.
