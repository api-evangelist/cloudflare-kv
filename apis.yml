aid: cloudflare-kv
name: Cloudflare KV
description: >
  Cloudflare Workers KV is a globally distributed key-value store that allows
  developers to store and retrieve data at low latency from Cloudflare's edge
  network. It provides a REST API for reading, writing, deleting, and listing
  key-value pairs across namespaces, making it ideal for caching, configuration
  management, session storage, API authorization, and dynamic routing. KV
  supports eventual consistency across Cloudflare's global network with read
  latencies under 5ms, and is accessible both via Workers bindings and external
  REST API calls.
